{{- if .Values.components.api }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "al-5g-ae.fullname" . }}-test-connection"
  labels:
    {{- include "al-5g-ae.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args: ['--timeout=10', '-qO-', 'http://{{ include "al-5g-ae.fullname" . }}-api:{{ .Values.api.service.port }}/health']
{{- end }}
